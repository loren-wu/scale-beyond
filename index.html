<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="《尺度之外》：从地球昼夜、月球与太阳系，连续缩放至银河系和本星系群的沉浸式 3D 宇宙尺度体验。" />
  <title>尺度之外 | Earth to the Local Group</title>
  <link rel="icon" href="data:," />
  <link rel="preload" href="assets/nasa/earth-blue-marble-2048.jpg" as="image" />
  <link rel="preload" href="assets/nasa/earth-black-marble-3600.jpg" as="image" />
  <link rel="stylesheet" href="style.css?v=scale-cosmic3" />
  <script type="importmap">
    {
      "imports": {
        "three": "./vendor/three.module.js"
      }
    }
  </script>
  <script type="module" src="main.js?v=scale-cosmic3"></script>
</head>
<body>
  <main class="experience" aria-label="尺度之外 3D 宇宙尺度探索">
    <div id="scene" class="scene" aria-hidden="true"></div>

    <section class="intro" aria-labelledby="project-title">
      <p class="kicker">尺度之外</p>
      <h1 id="project-title">From Earth to the Multiverse</h1>
    </section>

    <section class="scale-readout" aria-live="polite">
      <p id="layerName">Planet Surface</p>
      <strong id="scaleUnit">Low Earth orbit</strong>
      <span id="distanceValue">420 km above Earth</span>
    </section>

    <section class="caption" aria-live="polite">
      <p id="captionZh">你所看见的，只是其中一个尺度。</p>
      <p id="captionEn">What you see is only one scale of reality.</p>
    </section>

    <div id="hint" class="hint" role="note">
      <span>滚轮缩放</span>
      <span>拖拽移动视角</span>
    </div>

    <p id="assetStatus" class="asset-status" aria-live="polite">NASA IMAGERY · LOADING</p>

    <p id="locationMarker" class="location-marker" aria-hidden="true">
      <span>YOU ARE HERE</span>
      ORION SPUR · 27,000 LY FROM CENTER
    </p>

    <div class="scale-meter" aria-hidden="true">
      <span id="scaleBar"></span>
      <i style="--position: 0%">地表</i>
      <i style="--position: 9%">地球</i>
      <i style="--position: 21%">地月</i>
      <i style="--position: 44%">太阳系</i>
      <i style="--position: 69%">银河系</i>
      <i style="--position: 100%">本星系群</i>
    </div>
  </main>
</body>
</html>
